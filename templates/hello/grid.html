{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Experiment 10 - Bootstrap Grid</title>

    <!-- Bootstrap CSS -->

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Bootstrap Grid System Example</h2>

    <!-- Row 1 -->

            <img src="{% static 'images/python.jpg' %}" class="img-fluid mt-2">
        </div>

        <div class="col-md-4 bg-success text-white p-4 text-center">
            <h4>Django</h4>
            <img src="{% static 'images/django.jpg' %}" class="img-fluid mt-2">

        <div class="col-md-4 bg-warning text-dark p-4 text-center">
            <h4>Java</h4>
            <img src="{% static 'images/image1.webp' %}" class="img-fluid mt-2">
        </div>
    </div>

    <!-- Row 2 -->
    <div class="row mt-4">
        <div class="col-md-6 bg-info text-white p-4 text-center">
            <h4>HTML</h4>
            <img src="{% static 'images/image3.jpg' %}" class="img-fluid mt-2">
        </div>

        <div class="col-md-6 bg-danger text-white p-4 text-center">
            <h4>CSS</h4>
            <img src="{% static 'images/image1.webp' %}" class="img-fluid mt-2">
